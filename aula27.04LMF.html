<!DOCTYPE html>
<html lang = "pt-br">
 <head>
     <meta charset = "UTF-8">
     <meta name = "viewport" content = width=device-width, initial-scale=1.0">
     <title>Aula 27.04</title>
 </head>
 <body>
  <h4> Uma lista não ordenada </h4>
  <ul>
    <li>Café</li>
    <li>Chá</li>
    <li>Leite</li>
  </ul>

  <ul>
    <li>Café</li>
      <ul>
        <li type="Square">Grãos torrados</li>
        <li type="Square">Torrado e moído</li>
      </ul>
     <li>Leite</li>
  </ul>

  <ol type="A">
    <li>Café</li>
    <li>Leite</li>
  </ol>

  <ol type="I">
   <dt>Café</dt>
   <dd>Líquido preto e quente</dd>
   <dt>Leite</dt>
   <dd>Líquido branco utilizado no café</dd>
  </ol>
 </body>

</html>
