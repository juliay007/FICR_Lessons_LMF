<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <h2>Início do Formulário</h2>
    <form action="" method="post">
        Informe seu nome completo: <br/>
        <input type="text" name="nome" id="nome"> <br/> <br/>
        Informe seu gênero: <br/>
        <input type="radio" name="sex" id="sex">Feminino <br/>
        <input type="radio" name="sex" id="sex">Masculino <br/>
        Informe seu documento: <br/>
        <select name="Documento com Foto" id="doc">
            <option>Carteira de estudante</option>
            <option>RG</option>
            <option>Passaporte</option>
            <option>CNH</option>
        </select>
    </form>
</body>
</html>
